services:
  - type: web
    name: siwes-placement-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn siwes_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: siwes-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: AFRICASTALKING_USERNAME
        value: "sandbox"
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: SIWES_OFFICE_PHONE
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: siwes-db
    databaseName: siwes
    user: siwes
    plan: free