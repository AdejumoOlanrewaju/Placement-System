{% extends 'base.html' %}
{% block content %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Plus Jakarta Sans:wght@700;800&display=swap');
:root {
    --primary:rgb(183, 3, 3);--primary-light:#eff6ff;--primary-dark:#1d4ed8;
    --text:#0f172a;--text-muted:#64748b;--border:#e2e8f0;
    --surface:#ffffff;--bg:#f1f5f9;--radius:14px;--radius-sm:8px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:40px;width:100%;max-width:440px;}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
.brand-icon{width:40px;height:40px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.brand-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:var(--text);}
.brand-name span{color:var(--primary);}
h4{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--text);text-align:center;margin-bottom:8px;}
.subtitle{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:28px;line-height:1.6;}
.form-label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:7px;}
.form-control{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s;}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.btn-submit{width:100%;background:var(--primary);color:#fff;border:none;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;margin-top:20px;transition:background .18s;}
.btn-submit:hover{background:var(--primary-dark);}
.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--primary);}
</style>

<div class="auth-card">
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="brand-name">SIWES <span>Portal</span></div>
    </div>

    <h4>Forgot Password?</h4>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:16px;">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="Enter your registered email" required autofocus>
        </div>
        <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>

    <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
</div>
{% endblock %}
