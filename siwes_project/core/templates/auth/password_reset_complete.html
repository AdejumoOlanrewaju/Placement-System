{% extends 'base.html' %}
{% block content %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap');
:root{--primary:rgb(183, 3, 3);--primary-light:#eff6ff;--success:#16a34a;--success-light:#f0fdf4;--text:#0f172a;--text-muted:#64748b;--border:#e2e8f0;--surface:#ffffff;--bg:#f1f5f9;--radius:14px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:40px;width:100%;max-width:440px;text-align:center;}
</style>

<div class="auth-card">
    <div style="width:72px;height:72px;background:var(--success-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h4 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:10px;">
        Password Reset Successful
    </h4>
    <p style="font-size:13.5px;color:var(--text-muted);line-height:1.7;margin-bottom:28px;">
        Your password has been updated successfully. You can now log in with your new password.
    </p>
    <a href="{% url 'login' %}"
       style="display:inline-block;background:var(--primary);color:#fff;padding:12px 32px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;text-decoration:none;transition:background .18s;"
       onmouseover="this.style.background='#1d4ed8'"
       onmouseout="this.style.background='#2563eb'">
        Login Now
    </a>
</div>
{% endblock %}
